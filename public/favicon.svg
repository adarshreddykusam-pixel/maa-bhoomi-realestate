<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="favGradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2B5C" />
      <stop offset="100%" stop-color="#0F52BA" />
    </linearGradient>
    <linearGradient id="favGradRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F52BA" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  
  <g transform="translate(0, 10)">
    <!-- Buildings -->
    <!-- Left building -->
    <path d="M 40 60 L 40 22 L 50 14 L 55 19 L 55 60 Z" fill="url(#favGradLeft)" />
    <rect x="42" y="24" width="1" height="32" fill="#000" />
    <rect x="45" y="22" width="1" height="34" fill="#000" />
    <rect x="48" y="20" width="1" height="36" fill="#000" />
    <rect x="51" y="18" width="1" height="38" fill="#000" />
    
    <!-- Right building -->
    <path d="M 54.5 60 L 54.5 25 L 60 22 L 70 27 L 70 60 Z" fill="url(#favGradRight)" />
    <rect x="57" y="28" width="1" height="30" fill="#000" />
    <rect x="60" y="27" width="1" height="31" fill="#000" />
    <rect x="63" y="28" width="1" height="30" fill="#000" />
    <rect x="66" y="29" width="1" height="29" fill="#000" />

    <!-- Left House Roof -->
    <path d="M 10 65 L 38 35 L 66 65" fill="none" stroke="#1A2B5C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Left House Windows -->
    <rect x="34" y="47" width="3.5" height="3.5" fill="#000" />
    <rect x="38.5" y="47" width="3.5" height="3.5" fill="#000" />
    <rect x="34" y="51.5" width="3.5" height="3.5" fill="#000" />
    <rect x="38.5" y="51.5" width="3.5" height="3.5" fill="#000" />
    
    <!-- Right House Roof -->
    <path d="M 40 65 L 68 35 L 96 65" fill="none" stroke="#1A2B5C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Right House Windows -->
    <rect x="64" y="48" width="3" height="3" fill="#000" />
    <rect x="68" y="48" width="3" height="3" fill="#000" />
    <rect x="64" y="52.5" width="3" height="3" fill="#000" />
    <rect x="68" y="52.5" width="3" height="3" fill="#000" />
    
    <!-- Separator Line -->
    <line x1="10.5" y1="66" x2="95.5" y2="66" stroke="#000" stroke-width="1.8" />
  </g>
</svg>