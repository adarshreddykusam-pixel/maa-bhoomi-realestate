<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="100%">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="buildingGradLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A2B5C" />
      <stop offset="100%" stop-color="#0F52BA" />
    </linearGradient>
    <linearGradient id="buildingGradRight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F52BA" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Emblem Scaled Down and Placed Left -->
  <g transform="translate(10, -5) scale(0.35)">
    <!-- Buildings behind houses -->
    <!-- Left Building (Taller) -->
    <path d="M 191 260 L 191 105 L 231 75 L 249 93 L 249 260 Z" fill="url(#buildingGradLeft)" />
    <!-- Vertical window lines on Left Building -->
    <rect x="198" y="115" width="4.5" height="135" fill="#000" />
    <rect x="208" y="108" width="4.5" height="142" fill="#000" />
    <rect x="218" y="100" width="4.5" height="150" fill="#000" />
    <rect x="228" y="93" width="4.5" height="157" fill="#000" />
    <rect x="238" y="98" width="4.5" height="152" fill="#000" />

    <!-- Right Building (Shorter) -->
    <path d="M 248 260 L 248 135 L 268 123 L 308 143 L 308 260 Z" fill="url(#buildingGradRight)" />
    <!-- Vertical window lines on Right Building -->
    <rect x="256" y="145" width="4.5" height="105" fill="#000" />
    <rect x="266" y="140" width="4.5" height="110" fill="#000" />
    <rect x="276" y="145" width="4.5" height="105" fill="#000" />
    <rect x="286" y="150" width="4.5" height="100" fill="#000" />
    <rect x="296" y="155" width="4.5" height="95" fill="#000" />

    <!-- Birds flying (above buildings) -->
    <path d="M 258 75 Q 260 71 263 74 Q 266 71 268 75 Q 265 76 263 74 Q 261 76 258 75 Z" fill="#000" />
    <path d="M 270 60 Q 272 56 275 59 Q 278 56 280 60 Q 277 61 275 59 Q 273 61 270 60 Z" fill="#000" />
    <path d="M 284 68 Q 286 64 289 67 Q 292 64 294 68 Q 291 69 289 67 Q 287 69 284 68 Z" fill="#000" />
    <path d="M 268 85 Q 270 81 273 84 Q 276 81 278 85 Q 275 86 273 84 Q 271 86 268 85 Z" fill="#000" />
    <path d="M 292 80 Q 294 76 297 79 Q 300 76 302 80 Q 299 81 297 79 Q 295 81 292 80 Z" fill="#000" />

    <!-- Left House Roof -->
    <path d="M 50 280 L 180 150 L 310 280" fill="none" stroke="#1A2B5C" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Left House Windows -->
    <rect x="163" y="197" width="14" height="14" fill="#000" />
    <rect x="181" y="197" width="14" height="14" fill="#000" />
    <rect x="163" y="215" width="14" height="14" fill="#000" />
    <rect x="181" y="215" width="14" height="14" fill="#000" />
    <line x1="179.5" y1="197" x2="179.5" y2="229" stroke="#fff" stroke-width="2.5" />
    <line x1="163" y1="211" x2="195" y2="211" stroke="#fff" stroke-width="2.5" />

    <!-- Right House Roof -->
    <path d="M 190 280 L 320 150 L 450 280" fill="none" stroke="#1A2B5C" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Right House Windows -->
    <rect x="306" y="204" width="12" height="12" fill="#000" />
    <rect x="321" y="204" width="12" height="12" fill="#000" />
    <rect x="306" y="219" width="12" height="12" fill="#000" />
    <rect x="321" y="219" width="12" height="12" fill="#000" />
    <line x1="319.5" y1="204" x2="319.5" y2="231" stroke="#fff" stroke-width="2" />
    <line x1="306" y1="216" x2="333" y2="216" stroke="#fff" stroke-width="2" />

    <!-- Horizontal separator line -->
    <line x1="50" y1="285" x2="450" y2="285" stroke="#000" stroke-width="4.5" />
  </g>

  <!-- Typography Placed to the Right of Emblem -->
  <!-- "MAA Bhoomi Real Estate" in Serif style -->
  <text x="175" y="62" font-family="'Times New Roman', Georgia, serif" font-weight="bold" font-size="34" fill="#1A2B5C" letter-spacing="0.5">MAA Bhoomi Real Estate</text>

  <!-- "MARKETING SERVICES" in Sans-serif style -->
  <text x="175" y="96" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="13" fill="#0F52BA" letter-spacing="2.5">MARKETING SERVICES</text>

  <!-- Horizontal lines around "MARKETING SERVICES" -->
  <line x1="175" y1="84" x2="335" y2="84" stroke="#0F52BA" stroke-width="1.5" />
  <line x1="175" y1="104" x2="335" y2="104" stroke="#0F52BA" stroke-width="1.5" />
</svg>
